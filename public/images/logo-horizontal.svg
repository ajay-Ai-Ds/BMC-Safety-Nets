<svg xmlns="http://www.w3.org/2000/svg" width="280" height="56" viewBox="0 0 280 56" fill="none">
  <defs>
    <!-- Premium Blue Gradient -->
    <linearGradient id="blue-grad" x1="3" y1="3" x2="53" y2="53" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0b57d0" />
    </linearGradient>
    
    <!-- Light Blue Gradient for Net -->
    <linearGradient id="blue-grad-light" x1="10" y1="10" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Pigeon Gradient -->
    <linearGradient id="pigeon-grad" x1="22" y1="14" x2="45" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    
    <!-- Drop Shadow for Premium 3D look -->
    <filter id="premium-shadow" x="0" y="0" width="56" height="56" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0b57d0" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Logo Mark (Badge) -->
  <g filter="url(#premium-shadow)">
    <!-- Outer Shield / Circular Border (Enlarged to r=25 for Zoom effect) -->
    <circle cx="28" cy="28" r="25" stroke="url(#blue-grad)" stroke-width="2.5" fill="#0f172a" />
    
    <!-- Safety Net Pattern Grid (Enlarged to match circle) -->
    <path d="
      M 10 10 L 46 46 
      M 10 17 L 39 46 
      M 10 25 L 31 46 
      M 10 33 L 23 46 
      M 17 10 L 46 39 
      M 25 10 L 46 31 
      M 33 10 L 46 23 
      M 46 10 L 10 46 
      M 46 17 L 17 46 
      M 46 25 L 25 46 
      M 46 33 L 33 46 
      M 39 10 L 10 39 
      M 31 10 L 10 31 
      M 23 10 L 10 23
    " stroke="url(#blue-grad-light)" stroke-width="1.2" stroke-linecap="round" opacity="0.35" />

    <!-- Sleek Pigeon Silhouette scaled up by 22% and centered -->
    <g transform="translate(28, 28) scale(1.22) translate(-28, -28)">
      <path d="
        M 23 24 
        C 21.8 24.3, 20.8 23.8, 20 23.2 
        C 20.8 22.5, 21.8 22.1, 22.8 22.2 
        C 24 22.3, 25 23.2, 25.8 24 
        C 27 25.2, 28 26.8, 29.2 28 
        C 30 28.8, 31 29.5, 32 29 
        C 33.5 28.2, 34.8 26.2, 36 24 
        C 37.5 21.2, 39 18, 41 15 
        C 41.5 14.2, 42 14.5, 41.8 15.2 
        C 41 18.2, 39.5 22, 38 25.2 
        C 36.8 27.8, 35.2 30.5, 34.2 33 
        C 33.8 34, 34.2 34.8, 35 35.2 
        C 36.5 36, 38 37, 39.5 38.2 
        C 40.8 39.2, 42 40.5, 43 42 
        C 43.2 42.5, 42.8 43, 42 43 
        C 40 43, 38 42.5, 36 41.5 
        C 34 40.5, 32 39, 30.5 37.5 
        C 29 36, 27.5 34.2, 26 32 
        C 25 30.5, 24 28.8, 23 27.2 
        L 23 24 Z
      " fill="url(#pigeon-grad)" />
    </g>
  </g>

  <!-- Wordmark Text (Horizontal Layout, Larger and Shifted) -->
  <!-- BMC in Bold Premium Sans Serif -->
  <text x="65" y="27" font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif" font-size="24" font-weight="900" fill="#0f172a" letter-spacing="1">BMC</text>
  
  <!-- SAFETY NETS in sleek wide-spaced sans serif -->
  <text x="65" y="43" font-family="'Outfit', 'Inter', system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#2563eb" letter-spacing="4.8">SAFETY NETS</text>
  
  <!-- Divider line -->
  <line x1="58" y1="10" x2="58" y2="46" stroke="#e2e8f0" stroke-width="1.2" />
</svg>
